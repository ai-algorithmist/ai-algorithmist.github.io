<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIA 组内成果展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #f0f4f8 0%, #e8eef5 40%, #f5f0f8 100%);
            min-height: 100vh;
            color: #2c3e50;
            overflow-x: hidden;
        }

        /* ===== SUBTLE BACKGROUND TEXTURE ===== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(180, 200, 230, 0.25) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(200, 180, 230, 0.2) 0%, transparent 55%),
                radial-gradient(ellipse at 60% 10%, rgba(160, 210, 220, 0.15) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            padding: 50px 20px 24px;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(120deg, #4a7ab5, #8b5ea8, #3a9ea0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
        }

        .header-line {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #4a7ab5, #8b5ea8);
            border-radius: 2px;
            margin: 14px auto 0;
            opacity: 0.5;
        }

        .header p {
            margin-top: 14px;
            color: #7a8ea8;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        /* ===== MAIN LAYOUT ===== */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 32px;
            position: relative;
            z-index: 1;
        }

        /* ===== OVERVIEW WHEEL ===== */
        .wheel-container {
            position: relative;
            width: 560px;
            height: 560px;
            flex-shrink: 0;
        }

        /* SVG wheel */
        .wheel-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 8px 32px rgba(100, 140, 200, 0.15));
        }

        /* Center AIA circle */
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 900;
            color: white;
            box-shadow:
                0 6px 24px rgba(192, 57, 43, 0.3),
                0 0 0 6px rgba(192, 57, 43, 0.08),
                inset 0 1px 0 rgba(255,255,255,0.3);
            z-index: 10;
            cursor: default;
            letter-spacing: 1px;
        }

        /* Domain nodes */
        .domain-node {
            position: absolute;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 5;
            transform: translate(-50%, -50%);
            border: 3px solid rgba(255,255,255,0.85);
            box-shadow:
                0 6px 20px rgba(0,0,0,0.1),
                0 2px 8px rgba(0,0,0,0.06),
                inset 0 1px 0 rgba(255,255,255,0.6);
        }

        .domain-node:hover {
            transform: translate(-50%, -50%) scale(1.12);
            box-shadow:
                0 12px 32px rgba(0,0,0,0.14),
                0 4px 12px rgba(0,0,0,0.08),
                inset 0 1px 0 rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,1);
        }

        .domain-node.active {
            transform: translate(-50%, -50%) scale(1.15);
            border-color: #fff;
            box-shadow:
                0 0 0 5px rgba(255,255,255,0.6),
                0 14px 36px rgba(0,0,0,0.16),
                inset 0 1px 0 rgba(255,255,255,0.7);
        }

        .domain-node .domain-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            text-align: center;
            line-height: 1.3;
            text-shadow: 0 1px 4px rgba(0,0,0,0.25);
        }

        /* Domain colors — soft pastel gradients */
        .domain-jihefugai  {
            background: linear-gradient(135deg, #f4a3a3, #d95f5f);
            top: 12%; left: 50%;
        }
        .domain-chazhi     {
            background: linear-gradient(135deg, #c9a3e0, #9462c0);
            top: 28%; left: 80%;
        }
        .domain-zhengshu   {
            background: linear-gradient(135deg, #ffe082, #c8a000);
            top: 69%; left: 80%;
        }
        .domain-buxian     {
            background: linear-gradient(135deg, #88d4a0, #3a9d60);
            top: 88%; left: 50%;
        }
        .domain-lxingshang {
            background: linear-gradient(135deg, #85c1e9, #2e86c1);
            top: 69%; left: 20%;
        }
        .domain-suanfazhu  {
            background: linear-gradient(135deg, #a3b1e0, #3d55b0);
            top: 28%; left: 20%;
        }

        /* Ring SVG */
        .ring-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ===== PANEL SECTION ===== */
        .panel-section {
            width: 100%;
            max-width: 900px;
        }

        /* Works list panel */
        .works-panel {
            background: rgba(255,255,255,0.75);
            border: 1px solid rgba(180,200,230,0.5);
            border-radius: 20px;
            padding: 28px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow:
                0 4px 24px rgba(100,140,200,0.1),
                0 1px 4px rgba(100,140,200,0.08);
            display: none;
            animation: slideDown 0.35s ease;
        }

        .works-panel.show {
            display: block;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .works-panel-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 22px;
        }

        .works-panel-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            opacity: 0.85;
        }

        .works-panel-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2c3e50;
            letter-spacing: 0.5px;
        }

        .works-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .work-chip {
            background: rgba(255,255,255,0.8);
            border: 1.5px solid rgba(150,180,220,0.4);
            border-radius: 50px;
            padding: 9px 22px;
            cursor: pointer;
            font-size: 0.92rem;
            font-weight: 600;
            color: #4a6080;
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(100,140,200,0.08);
        }

        .work-chip:hover {
            background: rgba(240,246,255,0.95);
            border-color: rgba(100,150,220,0.6);
            color: #2c4a70;
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(100,140,200,0.15);
        }

        .work-chip.active {
            background: linear-gradient(135deg, #4a7ab5, #7a4ab5);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 16px rgba(74,122,181,0.3);
        }

        /* ===== DETAIL PANEL ===== */
        .detail-panel {
            margin-top: 20px;
            background: rgba(255,255,255,0.65);
            border: 1px solid rgba(180,200,230,0.4);
            border-radius: 18px;
            overflow: hidden;
            display: none;
            animation: slideDown 0.35s ease;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(100,140,200,0.08);
        }

        .detail-panel.show {
            display: block;
        }

        .detail-header {
            padding: 24px 28px 20px;
            border-bottom: 1px solid rgba(180,200,230,0.3);
            background: rgba(240,246,255,0.5);
        }

        .detail-tag {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 12px;
        }

        .detail-title {
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.6;
            color: #1a2c45;
        }

        .detail-body {
            padding: 24px 28px 28px;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .detail-section-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: #8fa5c0;
            margin-bottom: 10px;
        }

        .detail-abstract {
            font-size: 0.91rem;
            line-height: 1.9;
            color: #4a5e72;
        }

        .detail-image {
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            border: 1px solid rgba(180,200,230,0.4);
            display: block;
            box-shadow: 0 4px 16px rgba(100,140,200,0.1);
        }

        .detail-links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .detail-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.87rem;
            font-weight: 600;
            transition: all 0.25s ease;
            border: 1.5px solid;
        }

        .detail-link.url {
            color: #2e6fbe;
            border-color: rgba(46, 111, 190, 0.4);
            background: rgba(46, 111, 190, 0.06);
        }

        .detail-link.url:hover {
            background: rgba(46, 111, 190, 0.12);
            border-color: rgba(46, 111, 190, 0.7);
            box-shadow: 0 4px 14px rgba(46, 111, 190, 0.15);
            transform: translateY(-2px);
        }

        .detail-link.github {
            color: #2a8a52;
            border-color: rgba(42, 138, 82, 0.4);
            background: rgba(42, 138, 82, 0.06);
        }

        .detail-link.github:hover {
            background: rgba(42, 138, 82, 0.12);
            border-color: rgba(42, 138, 82, 0.7);
            box-shadow: 0 4px 14px rgba(42, 138, 82, 0.15);
            transform: translateY(-2px);
        }

        .link-icon { font-size: 1rem; }

        /* No content note */
        .no-content {
            color: #9ab0c8;
            font-style: italic;
            font-size: 0.9rem;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: rgba(180,200,230,0.3);
        }

        /* ===== BREADCRUMB ===== */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.84rem;
            color: #8fa5c0;
            margin-bottom: 18px;
        }

        .breadcrumb span { cursor: default; }
        .breadcrumb .bc-sep { opacity: 0.4; }
        .breadcrumb .bc-active { color: #2c3e50; font-weight: 600; }
        .breadcrumb .bc-link {
            cursor: pointer;
            color: #6a90b8;
            transition: color 0.2s;
        }
        .breadcrumb .bc-link:hover { color: #2c3e50; }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            padding: 15px;  /* 30px -> 15px */
            color: #aabdd0;
            font-size: 0.8rem;
            position: relative;
            z-index: 1;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .wheel-container { width: 340px; height: 340px; }
            .domain-node { width: 72px; height: 72px; }
            .domain-node .domain-name { font-size: 0.75rem; }
            .center-circle { width: 65px; height: 65px; font-size: 1.1rem; }
            .header h1 { font-size: 1.6rem; }
            .detail-title { font-size: 1.05rem; }
            .detail-body, .works-panel { padding: 16px; }
        }

        /* Pulse animation */
        @keyframes pulse {
            0%   { box-shadow: 0 6px 20px rgba(0,0,0,0.1), 0 0 0 0 rgba(74,122,181,0.4); }
            70%  { box-shadow: 0 6px 20px rgba(0,0,0,0.1), 0 0 0 14px rgba(74,122,181,0); }
            100% { box-shadow: 0 6px 20px rgba(0,0,0,0.1), 0 0 0 0 rgba(74,122,181,0); }
        }

        .domain-node.pulse {
            animation: pulse 2.2s infinite;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <h1>AIA 组内成果展示</h1>
    <div class="header-line"></div>
    <p>点击轮盘中的研究领域，探索我们的工作成果</p>
</div>

<!-- MAIN -->
<div class="main-container">

    <!-- WHEEL -->
    <div class="wheel-container" id="wheelContainer">

        <!-- Ring SVG -->
        <svg class="ring-svg" viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg">
            <!-- Outer soft fill ring -->
            <circle cx="280" cy="280" r="210" fill="none"
                    stroke="rgba(150,180,220,0.12)" stroke-width="56"/>
            <!-- Main ring -->
            <circle cx="280" cy="280" r="210" fill="none"
                    stroke="rgba(100,150,210,0.45)" stroke-width="2.5"

            <!-- Inner glow ring -->
            <circle cx="280" cy="280" r="210" fill="none"
                    stroke="rgba(120,160,220,0.2)" stroke-width="14"/>
            <!-- Spoke lines from center to nodes -->
            <line x1="280" y1="280" x2="280" y2="70"   stroke="rgba(150,180,220,0.2)" stroke-width="1.5"/>
            <line x1="280" y1="280" x2="462" y2="175"  stroke="rgba(150,180,220,0.2)" stroke-width="1.5"/>
            <line x1="280" y1="280" x2="462" y2="385"  stroke="rgba(150,180,220,0.2)" stroke-width="1.5"/>
            <line x1="280" y1="280" x2="280" y2="490"  stroke="rgba(150,180,220,0.2)" stroke-width="1.5"/>
            <line x1="280" y1="280" x2="98"  y2="385"  stroke="rgba(150,180,220,0.2)" stroke-width="1.5"/>
            <line x1="280" y1="280" x2="98"  y2="175"  stroke="rgba(150,180,220,0.2)" stroke-width="1.5"/>
            <!-- Dots on ring -->
            <circle cx="280" cy="70"  r="5" fill="rgba(120,160,220,0.5)"/>
            <circle cx="462" cy="175" r="5" fill="rgba(120,160,220,0.5)"/>
            <circle cx="462" cy="385" r="5" fill="rgba(120,160,220,0.5)"/>
            <circle cx="280" cy="490" r="5" fill="rgba(120,160,220,0.5)"/>
            <circle cx="98"  cy="385" r="5" fill="rgba(120,160,220,0.5)"/>
            <circle cx="98"  cy="175" r="5" fill="rgba(120,160,220,0.5)"/>
        </svg>

        <!-- Center AIA -->
        <div class="center-circle">AIA</div>

        <!-- Domain nodes -->
        <div class="domain-node domain-jihefugai pulse" data-domain="集合覆盖" style="top:12%;left:50%;">
            <span class="domain-name">集合<br>覆盖</span>
        </div>
        <div class="domain-node domain-chazhi" data-domain="插值" style="top:28%;left:80%;">
            <span class="domain-name">插值</span>
        </div>
        <div class="domain-node domain-zhengshu" data-domain="整数规划" style="top:69%;left:80%;">
            <span class="domain-name">整数<br>规划</span>

        <div class="domain-node domain-buxian" data-domain="布线" style="top:88%;left:50%;">
            <span class="domain-name">布线</span>
        </div>
        <div class="domain-node domain-lxingshang" data-domain="旅行商" style="top:69%;left:20%;">
            <span class="domain-name">旅行商</span>
        </div>
        <div class="domain-node domain-suanfazhu" data-domain="算法助手" style="top:28%;left:20%;">
            <span class="domain-name">算法<br>助手</span>
        </div>
    </div>

    <!-- PANEL SECTION -->
    <div class="panel-section" id="panelSection">

        <div class="works-panel" id="worksPanel">
            <div class="breadcrumb" id="breadcrumb">
                <span class="bc-link" onclick="resetAll()">概览</span>
                <span class="bc-sep">›</span>
                <span class="bc-active" id="bcDomain"></span>
            </div>
            <div class="works-panel-header">
                <div class="works-panel-dot" id="worksDot"></div>
                <div class="works-panel-title" id="worksPanelTitle"></div>

            <div class="works-grid" id="worksGrid"></div>

            <!-- Detail panel (nested) -->
            <div class="detail-panel" id="detailPanel">
                <div class="detail-header">
                    <div class="detail-tag" id="detailTag"></div>
                    <div class="detail-title" id="detailTitle"></div>
                </div>
                <div class="detail-body" id="detailBody"></div>
            </div>
        </div>

    </div>
</div>

<!-- FOOTER -->
<div class="footer">AIA Research Group · 成果汇总展示平台</div>

// ============================================================
// DATA
// ============================================================
const domains = {
    "集合覆盖": {
        color: "#d95f5f",
        dotColor: "#d95f5f",
        works: ["AIA-SC"]
    },
    "插值": {
        color: "#9462c0",

    },
    "整数规划": {
        color: "#b08a00",

    "布线": {
        color: "#3a9d60",

        works: ["NeuralSteiner", "AiDRC"]
    },
    "旅行商": {
        color: "#2e86c1",
        dotColor: "#2e86c1",
        works: ["LKH-5342", "Neural-3OPT", "Neural-GLS"]
    },
    "算法助手": {
        color: "#3d55b0",
        dotColor: "#3d55b0",
        works: ["CoPA"]
    }
};

const works = {
    "AIA-SC": {
        title: "Learning to Design Greedy Algorithm for NP-Complete Problems",
        abstract: "Algorithm design is an art that heavily requires human designers' intuition, expertise, and insights into the combinatorial structure of the problems under consideration. In particular, while greedy algorithms for NP-complete problems are generally straightforward, finding an effective greedy-selection rule is consistently challenging. In the study, we introduce an approach called artificial intelligence algorithmist for set cover problem (AIA-SC), which leverages neural networks as greedy-selection rules to solve the minimum weighted set cover problem (WSCP), an NP-complete problem. Initially, we formulate a given WSCP as a 0–1 integer linear program (ILP), in which each variable xᵢ is binary: xᵢ = 0 indicating the exclusion of set sᵢ, and xᵢ = 1 indicating the selection of the set. Subsequently, we design a generic search framework to identify the optimal solution to the ILP. At each search step, the value of a variable is determined with the aid of neural networks. The key ingredients of our neural network involve the design of its loss function and training process: the original ILP problem and the sub-problems generated by assigning a variable xᵢ should satisfy the Bellman-Ford equation, which enables us to set the violation of Bellman-Ford equation as loss function of our neural network. Experimental results on representative instances indicate that the neural network-based greedy selection rule effectively identifies optimal solutions and surpasses the performance of the human-crafted Chvatal's greedy algorithm. Furthermore, the basic idea of our approach can be readily extended to design greedy algorithms for other NP-hard problems without significant modification.",
        // url: "https://doi.org/10.1007/978-981-96-1490-5_3",
        url: "https://link.springer.com/chapter/10.1007/978-981-96-1490-5_3",
        github: "https://github.com/zxding94/aia-sc",
        image: "images/aiasc.jpg"
    },
    "CoPA": {
        title: "CoPA: Collaborative Programming Assistant",
        abstract: null,
        url: null,
        github: null,
        image: "images/copa.jpg"
    },
    "NIERT": {
        title: "NIERT: Accurate Numerical Interpolation Through Unifying Scattered Data Representations Using Transformer Encoder",
        abstract: "Interpolation for scattered data is a classical problem in numerical analysis, with a long history of theoretical and practical contributions. Recent advances have utilized deep neural networks to construct interpolators, exhibiting excellent and generalizable performance. However, they still fall short in two aspects: 1) inadequate representation learning, resulting from separate embeddings of observed and target points in popular encoder-decoder frameworks and 2) limited generalization power, caused by overlooking prior interpolation knowledge shared across different domains. To overcome these limitations, we present a Numerical Interpolation approach using Encoder Representation of Transformers (called NIERT). On one hand, NIERT utilizes an encoder-only framework rather than the encoder-decoder structure. This way, NIERT can embed observed and target points into a unified encoder representation space, thus effectively exploiting the correlations among them and obtaining more precise representations. On the other hand, we propose to pre-train NIERT on large-scale synthetic mathematical functions to acquire prior interpolation knowledge, and transfer it to multiple interpolation domains with consistent performance gain. On both synthetic and real-world datasets, NIERT outperforms the existing approaches by a large margin, i.e., 4.3∼14.3× lower MAE on TFRD subsets, and 1.7/1.8/8.7× lower MSE on Mathit/PhysioNet/PTV datasets.",
        // url: "https://doi.org/10.1109/TKDE.2024.3402444",
        url: "https://ieeexplore.ieee.org/abstract/document/10533693?casa_token=baKkiXHePU4AAAAA:uxzLVJ_0bUoV0NLb3rvV123IcmZzIjvVLQFInEH5Ddo_PznZPkop1-VNXQhST-WIkkjCvY5h2lqC",
        github: "https://github.com/DingShizhe/NIERT",
        image: "images/niert.jpg"
    },
    "HINT": {
        title: "Accurate Interpolation for Scattered Data through Hierarchical Residual Refinement",
        abstract: "Accurate interpolation algorithms are highly desired in various theoretical and engineering scenarios. Unlike the traditional numerical algorithms that have exact zero-residual constraints on observed points, the neural network-based interpolation methods exhibit non-zero residuals at these points. These residuals, which provide observations of an underlying residual function, can guide predicting interpolation functions, but have not been exploited by the existing approaches. To fill this gap, we propose Hierarchical INTerpolation Network (HINT), which utilizes the residuals on observed points to guide target function estimation in a hierarchical fashion. HINT consists of several sequentially arranged lightweight interpolation blocks. The first interpolation block estimates the main component of the target function, while subsequent blocks predict the residual components using observed points residuals of the preceding blocks. The main component and residual components are accumulated to form the final interpolation results. Furthermore, under the assumption that finer residual prediction requires a more focused attention range on observed points, we utilize hierarchical local constraints in correlation modeling between observed and target points. Extensive experiments demonstrate that HINT outperforms existing interpolation algorithms significantly in terms of interpolation accuracy across a wide variety of datasets, which underscores its potential for practical scenarios.",

// ============================================================
// STATE
// ============================================================
let currentDomain = null;
let currentWork   = null;

// ============================================================
// INIT
// ============================================================
document.querySelectorAll('.domain-node').forEach(node => {
    node.addEventListener('click', () => {
        const domain = node.dataset.domain;
        selectDomain(domain, node);
    });
});

// ============================================================
// DOMAIN SELECTION
// ============================================================
function selectDomain(domain, nodeEl) {
    document.querySelectorAll('.domain-node').forEach(n => n.classList.remove('pulse'));
    document.querySelectorAll('.domain-node').forEach(n => n.classList.remove('active'));

    if (currentDomain === domain && !currentWork) {
        currentDomain = null;
        hideWorksPanel();
        return;
    }

    currentDomain = domain;
    currentWork   = null;
    nodeEl.classList.add('active');

    showWorksPanel(domain);
    hideDetailPanel();

    setTimeout(() => {
        document.getElementById('panelSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
}

// ============================================================
// WORKS PANEL
// ============================================================
function showWorksPanel(domain) {
    const d = domains[domain];
    const panel = document.getElementById('worksPanel');
    const title = document.getElementById('worksPanelTitle');
    const dot   = document.getElementById('worksDot');
    const grid  = document.getElementById('worksGrid');
    const bcDomain = document.getElementById('bcDomain');

    title.textContent = domain + ' — 研究工作';
    dot.style.background = d.dotColor;
    bcDomain.textContent = domain;

    grid.innerHTML = '';
    d.works.forEach(workKey => {
        const chip = document.createElement('div');
        chip.className = 'work-chip';
        chip.textContent = workKey;
        chip.dataset.work = workKey;
        chip.addEventListener('click', () => selectWork(workKey, chip));
        grid.appendChild(chip);
    });

    panel.classList.remove('show');
    void panel.offsetWidth;
    panel.classList.add('show');
}

function hideWorksPanel() {
    document.getElementById('worksPanel').classList.remove('show');
    hideDetailPanel();
}

// ============================================================
// WORK SELECTION
// ============================================================
function selectWork(workKey, chipEl) {
    document.querySelectorAll('.work-chip').forEach(c => c.classList.remove('active'));

    if (currentWork === workKey) {
        currentWork = null;
        chipEl.classList.remove('active');
        hideDetailPanel();
        return;
    }

    currentWork = workKey;
    chipEl.classList.add('active');
    showDetailPanel(workKey);

    setTimeout(() => {
        document.getElementById('detailPanel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
}

// ============================================================
// DETAIL PANEL
// ============================================================
function showDetailPanel(workKey) {
    const w = works[workKey];
    const panel = document.getElementById('detailPanel');
    const tag   = document.getElementById('detailTag');
    const title = document.getElementById('detailTitle');
    const body  = document.getElementById('detailBody');

    tag.textContent = workKey;
    const dc = domains[currentDomain].dotColor;
    tag.style.background = dc + '18';
    tag.style.color      = dc;
    tag.style.border     = '1px solid ' + dc + '44';

    title.textContent = w.title;
    body.innerHTML = '';

    const hasContent = w.abstract || w.image || w.url || w.github;

    if (!hasContent) {
        const noContent = document.createElement('div');
        noContent.className = 'no-content';
        noContent.textContent = '暂无详细内容，敬请期待。';
        body.appendChild(noContent);
    } else {
        if (w.abstract) {
            body.appendChild(buildSection('摘要', `<p class="detail-abstract">${w.abstract}</p>`));
        }
        if (w.image) {
            body.appendChild(buildDivider());
            body.appendChild(buildSection('成果展示', `<img class="detail-image" src="${w.image}" alt="${workKey} 成果图"/>`));
        }
        if (w.url || w.github) {
            body.appendChild(buildDivider());
            body.appendChild(buildSection('相关链接', buildLinks(w)));
        }
    }

    panel.classList.remove('show');
    void panel.offsetWidth;
    panel.classList.add('show');
}

function buildSection(label, contentHtml) {
    const sec = document.createElement('div');
    sec.innerHTML = `<div class="detail-section-label">${label}</div>${contentHtml}`;
    return sec;
}

function buildDivider() {
    const d = document.createElement('div');
    d.className = 'divider';
    return d;
}

function buildLinks(w) {
    let html = '<div class="detail-links">';
    if (w.url) {
        html += `<a class="detail-link url" href="${w.url}" target="_blank" rel="noopener">
                    <span class="link-icon">📄</span> 论文
                 </a>`;
    }
    if (w.github) {
        html += `<a class="detail-link github" href="${w.github}" target="_blank" rel="noopener">
                    <span class="link-icon">💻</span> GitHub
                 </a>`;
    }
    html += '</div>';
    return html;
}

function hideDetailPanel() {
    document.getElementById('detailPanel').classList.remove('show');
    currentWork = null;
    document.querySelectorAll('.work-chip').forEach(c => c.classList.remove('active'));
}

// ============================================================
// RESET
// ============================================================
function resetAll() {
    currentDomain = null;
    currentWork   = null;
    document.querySelectorAll('.domain-node').forEach(n => n.classList.remove('active', 'pulse'));
    document.querySelector('.domain-jihefugai').classList.add('pulse');
    hideWorksPanel();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

</body>
</html>
